<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTRAL OVERRIDE SYSTEM v4.0 - SOUND INTEGRATED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @font-face {
            font-family: 'HackerFont';
            src: local('Courier New'), local('Courier'), monospace;
        }

        body {
            background-color: #000;
            color: #0f3;
            font-family: 'HackerFont', monospace;
            padding: 10px;
            margin: 0;
            overflow: hidden;
            background-image: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px);
            background-size: 100% 2px;
            text-shadow: 0 0 5px #0f3, 0 0 10px #0f3;
        }

        /* Layout Grid Monitor Utama */
        .monitor-layout {
            display: grid;
            grid-template-columns: 3fr 2fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
            height: calc(100vh - 20px);
        }

        /* Desain Jendela Standard */
        .window {
            border: 1px solid #0f3;
            background: rgba(0, 8, 0, 0.85);
            box-shadow: 0 0 15px rgba(0, 255, 51, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .window-header {
            background-color: #0f3;
            color: #000;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            text-transform: uppercase;
            text-shadow: none;
            display: flex;
            justify-content: space-between;
        }

        .window-content {
            padding: 10px;
            font-size: 11px;
            overflow: hidden;
            flex-grow: 1;
            position: relative;
        }

        .left-top { grid-column: 1 / 2; grid-row: 1 / 2; }
        .left-bottom { grid-column: 1 / 2; grid-row: 2 / 3; }
        .right-top { grid-column: 2 / 3; grid-row: 1 / 2; }
        .right-bottom { grid-column: 2 / 3; grid-row: 2 / 3; }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        input[type="text"] {
            flex-grow: 1;
            background: #000;
            border: 1px solid #0f3;
            color: #0f3;
            padding: 6px;
            font-family: 'HackerFont', monospace;
            outline: none;
        }

        button {
            background: #0f3;
            color: #000;
            border: none;
            padding: 6px 15px;
            font-family: 'HackerFont', monospace;
            font-weight: bold;
            cursor: pointer;
        }

        .profile-card {
            display: none;
            grid-template-columns: 100px 1fr;
            gap: 15px;
            animation: fadeIn 0.4s ease-out;
            margin-top: 10px;
            border-top: 1px dashed rgba(0,255,51,0.4);
            padding-top: 10px;
        }

        .photo-box {
            border: 1px solid #0f3;
            height: 120px;
            background: #000;
            position: relative;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(140%);
        }

        .photo-box::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: #0f3;
            top: 0;
            animation: scanline 2s linear infinite;
        }

        #globe-container {
            width: 100%;
            height: 85%;
            background: #000;
        }

        .tracking-status {
            position: absolute;
            bottom: 5px;
            left: 10px;
            font-size: 10px;
            color: #0f3;
        }

        .cctv-screen {
            width: 100%;
            height: 85%;
            background: #030;
            border: 1px solid #0f3;
            position: relative;
            overflow: hidden;
        }

        .cctv-screen video, .cctv-screen .fallback-static {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cctv-overlay {
            position: absolute;
            top: 5px;
            left: 5px;
            color: red;
            font-weight: bold;
            font-size: 10px;
            animation: blink 1s infinite;
        }

        .cctv-timestamp {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 10px;
        }

        #terminal-output {
            color: #0a3;
            height: 130px;
            overflow-y: auto;
            font-size: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes scanline { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

<div class="monitor-layout">
    
    <div class="window left-top">
        <div class="window-header"><span>個人資料庫 // SYSTEM ARCHIVE</span><span>[X]</span></div>
        <div class="window-content">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="INPUT TARGET CALLSIGN (e.g., budi, li)..." onkeydown="playTypeSound()" autocomplete="off">
                <button onclick="executeBypass()">BYPASS</button>
            </div>
            <div id="status-log">> AWAITING INTRUSION COMMAND...</div>

            <div class="profile-card" id="profile-result">
                <div class="photo-box"><img id="target-photo" src=""></div>
                <div>
                    <div><strong>NAME:</strong> <span id="res-name"></span></div>
                    <div><strong>CODE:</strong> <span id="res-code"></span></div>
                    <div><strong>LOC:</strong> <span id="res-loc"></span></div>
                    <div><strong>IP:</strong> <span id="res-ip"></span></div>
                    <div style="color: red; font-weight: bold;"><strong>STATUS:</strong> <span id="res-status"></span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="window right-top">
        <div class="window-header"><span>全球定位追蹤 // GLOBAL GEOLOCATION TRACER</span><span>[-]</span></div>
        <div class="window-content">
            <div id="globe-container"></div>
            <div class="tracking-status" id="globe-status">GLOBE STATUS: ROTATING_IDLE</div>
        </div>
    </div>

    <div class="window left-bottom">
        <div class="window-header"><span>主伺服器核心 // CORE SERVER TRACE LOGS</span><span>[_]</span></div>
        <div class="window-content">
            <div id="terminal-output"></div>
        </div>
    </div>

    <div class="window right-bottom">
        <div class="window-header"><span>目標當前位置 // LIVE CCTV INTEL</span><span>LIVE</span></div>
        <div class="window-content">
            <div class="cctv-screen">
                <div class="cctv-overlay">REC ● CAM_A3</div>
                <div class="cctv-timestamp" id="cctv-time">00:00:00</div>
                <video id="cctv-video" src="https://assets.mixkit.co/videos/preview/mixkit-security-camera-of-a-corridor-of-a-building-40176-large.mp4" loop muted playsinline></video>
                <div id="cctv-static" class="fallback-static" style="display: flex; align-items: center; justify-content: center; background:#000; color:#0f3; font-size:14px; text-align:center;">SIGNAL LOST / NO TARGET FEED</div>
            </div>
        </div>
    </div>

</div>

<script>
    // --- ENGINE EFEK SUARA (Web Audio API) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    // Fungsi suara keyboard mekanik klik pendek
    function playTypeSound() {
        // Melanjutkan konteks audio jika browser sempat memblokirnya
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'triangle'; 
        osc.frequency.setValueAtTime(150 + Math.random() * 100, audioCtx.currentTime); // Frekuensi acak dikit biar natural
        
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05); // Suara mati cepat (klik)

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
    }

    // Suara "BEEP" Alarm Sukses Meretas
    function playSuccessAlarm() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); // Nada Tinggi
        
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    // --- DATABASE LOKAL ---
    const database = [
        {
            callsign: "li",
            name: "Li Guoliang (李國樑)",
            code: "CN_X902",
            loc: "Shenzhen, Guangdong",
            ip: "103.22.109.4",
            status: "TARGET LOCKED / EXFILTRATION",
            foto: "https://images.unsplash.com/photo-1549740429-121580232c76?w=200",
            video: "https://assets.mixkit.co/videos/preview/mixkit-security-camera-of-a-corridor-of-a-building-40176-large.mp4",
            lat: 22.5431, lon: 114.0579
        },
        {
            callsign: "budi",
            name: "Budi Setyawan",
            code: "ID_B007",
            loc: "Jakarta, Indonesia",
            ip: "192.168.43.11",
            status: "MONITORED / ACTIVE",
            foto: "https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=200",
            video: "https://assets.mixkit.co/videos/preview/mixkit-people-walking-in-a-modern-subway-station-40092-large.mp4",
            lat: -6.2088, lon: 106.8456
        }
    ];

    // --- INTEGRASI THREE.JS (BOLA DUNIA 3D) ---
    const container = document.getElementById('globe-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(5, 24, 24);
    const material = new THREE.MeshBasicMaterial({ color: 0x00ff33, wireframe: true, transparent: true, opacity: 0.4 });
    const globe = new THREE.Mesh(geometry, material);
    scene.add(globe);
    camera.position.z = 12;

    const markerGeo = new THREE.SphereGeometry(0.2, 8, 8);
    const markerMat = new THREE.MeshBasicMaterial({ color: 0xff0000, visible: false });
    const targetMarker = new THREE.Mesh(markerGeo, markerMat);
    scene.add(targetMarker);

    function animate() {
        requestAnimationFrame(animate);
        if(!isLocked) { globe.rotation.y += 0.003; }
        renderer.render(scene, camera);
    }
    let isLocked = false;
    animate();

    function convertCoords(lat, lon, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        return {
            x: -(radius * Math.sin(phi) * Math.sin(theta)),
            y: radius * Math.cos(phi),
            z: radius * Math.sin(phi) * Math.cos(theta)
        };
    }

    // --- LOGIKA PENCARIAN & CCTV ---
    function executeBypass() {
        const input = document.getElementById('search-input').value.toLowerCase().trim();
        const log = document.getElementById('status-log');
        const card = document.getElementById('profile-result');
        const vVideo = document.getElementById('cctv-video');
        const vStatic = document.getElementById('cctv-static');
        const gStatus = document.getElementById('globe-status');

        if(input === "") return;

        log.innerHTML = "BRUTAL FORCING SERVER...<br>DECRYPTING HOST PACKETS...";
        card.style.display = 'none';
        vVideo.style.display = 'none';
        vStatic.style.display = 'flex';
        vStatic.innerText = "SCANNING REFRESH RATES...";
        isLocked = false;
        targetMarker.material.visible = false;

        setTimeout(() => {
            const res = database.find(t => t.callsign === input || t.name.toLowerCase().includes(input));
            
            if(res) {
                log.innerHTML = "<span style='color:#0f3'>ACCESS GRANTED. INTEL INCOMING.</span>";
                
                // Bunyikan Alarm Hacker Berhasil
                playSuccessAlarm();

                document.getElementById('res-name').innerText = res.name;
                document.getElementById('res-code').innerText = res.code;
                document.getElementById('res-loc').innerText = res.loc;
                document.getElementById('res-ip').innerText = res.ip;
                document.getElementById('res-status').innerText = res.status;
                document.getElementById('target-photo').src = res.foto;
                card.style.display = 'grid';

                isLocked = true;
                const pos = convertCoords(res.lat, res.lon, 5.05);
                targetMarker.position.set(pos.x, pos.y, pos.z);
                targetMarker.material.visible = true;
                
                globe.rotation.set(0,0,0);
                camera.position.set(pos.x * 2.2, pos.y * 2.2, pos.z * 2.2);
                camera.lookAt(pos.x, pos.y, pos.z);
                gStatus.innerHTML = `TARGET LOCKED AT COORDINATES: [${res.lat}, ${res.lon}]`;

                vStatic.style.display = 'none';
                vVideo.style.display = 'block';
                vVideo.src = res.video;
                vVideo.play().catch(()=>{});

            } else {
                log.innerHTML = "<span style='color:red'>TARGET CORRUPT / NOT FOUND IN ARCHIVE.</span>";
                vStatic.innerText = "SIGNAL LOST / NO TARGET FEED";
                gStatus.innerHTML = "GLOBE STATUS: ROTATING_IDLE";
            }
        }, 1500);
    }

    // Jalankan eksekusi bypass jika tombol enter ditekan
    document.getElementById('search-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { executeBypass(); }
    });

    // --- LOG TERMINAL OTOMATIS & JAM ---
    setInterval(() => {
        const out = document.getElementById('terminal-output');
        const logs = [
            `> Bypass packet stream: ${Math.random().toString(36).substring(4)}`,
            `> Ping state to master_node... OK (32ms)`,
            `> Mirroring feed encrypted port...`,
            `> Clearing footprint logs... SUCCESS`
        ];
        out.innerHTML += `<div>${logs[Math.floor(Math.random() * logs.length)]}</div>`;
        out.scrollTop = out.scrollHeight;
        if(out.childElementCount > 15) out.removeChild(out.firstChild);
    }, 1000);

    setInterval(() => {
        const d = new Date();
        document.getElementById('cctv-time').innerText = `${d.toLocaleDateString()} ${d.toLocaleTimeString()}`;
    }, 1000);
</script>
</body>
</html>
