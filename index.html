<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM PENGINTAI v6.0 - NEW TAB LAYER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @font-face {
            font-family: 'HackerFont';
            src: local('Courier New'), local('Courier'), monospace;
        }

        body {
            background-color: #020602;
            color: #0f3;
            font-family: 'HackerFont', monospace;
            padding: 0;
            margin: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-image: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2) 1px, transparent 1px, transparent 2px);
            background-size: 100% 2px;
            text-shadow: 0 0 4px #0f3;
        }

        /* GAYA JENDELA ACAK (NEW TAB LAYER) */
        .window {
            position: absolute;
            border: 1px solid #0f3;
            background: rgba(0, 8, 0, 0.95);
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .window-header {
            background-color: #0f3;
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            text-transform: uppercase;
            text-shadow: none;
            display: flex;
            justify-content: space-between;
            cursor: move; /* Menandakan bisa digeser (fungsi drag tidak diimplementasikan) */
        }

        .window-content {
            padding: 8px;
            font-size: 10px;
            overflow: hidden;
            flex-grow: 1;
            position: relative;
        }

        /* POSISI ACAK DAN SALING MENUMPUK */

        /* 1. Jendela Log (Kiri Belakang) */
        .win-log {
            top: 10%; left: 5%; width: 280px; height: 300px; z-index: 10;
        }

        /* 2. Jendela Bola Dunia (Kanan Belakang) */
        .win-globe {
            top: 5%; right: 8%; width: 400px; height: 400px; z-index: 15;
        }

        /* 3. Jendela CCTV (Kiri Bawah) */
        .win-cctv {
            bottom: 10%; left: 8%; width: 350px; height: 250px; z-index: 20;
        }

        /* 4. JENDELA UTAMA DATA TARGET (DI TENGAH DEPAN) */
        .win-main-data {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            min-height: 350px;
            z-index: 100; /* Z-index tertinggi agar menutupi yang lain */
            border: 2px solid #0f3;
            box-shadow: 0 0 30px rgba(0, 255, 51, 0.5);
            background: rgba(0, 10, 0, 0.98);
        }

        /* Komponen Input */
        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            background: #000;
            border: 1px solid #0f3;
            color: #0f3;
            padding: 6px;
            font-family: 'HackerFont', monospace;
            outline: none;
            font-size: 12px;
        }

        button {
            background: #0f3;
            color: #000;
            border: none;
            padding: 6px 15px;
            font-family: 'HackerFont', monospace;
            font-weight: bold;
            cursor: pointer;
        }

        /* Desain Data Target */
        .profile-card {
            display: none; /* Sembunyikan sebelum dicari */
            grid-template-columns: 110px 1fr;
            gap: 15px;
            animation: fadeIn 0.3s ease-out;
            margin-top: 10px;
            border-top: 1px dashed rgba(0,255,51,0.4);
            padding-top: 10px;
        }

        .photo-box {
            border: 1px solid #0f3;
            height: 130px;
            background: #000;
            position: relative;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(120%) brightness(90%);
        }

        .photo-box::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: #0f3;
            top: 0;
            animation: scanline 2s linear infinite;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
